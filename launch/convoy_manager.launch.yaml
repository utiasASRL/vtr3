## Online Convoy Manger
session_name: vtr_convoy_manager
environment:
  RMW_IMPLEMENTATION: rmw_zenoh_cpp
  ROBOTS: "[mr_green,col_mustard,mrs_peacock,prof_plum]" # Figure out how to easily make this configurable

start_directory: ${VTRDATA}
suppress_history: false

windows:
  - window_name: vtr_gui
    layout: main-horizontal
    shell_command_before:
      - source ${VTRSRC}/main/install/setup.bash
    panes:
      - ros2 run vtr_gui multi_robot_socket_client --ros-args -r __ns:=/vtr -p robots:=$ROBOTS
      - ros2 run vtr_gui multi_robot_socket_server --ros-args -r __ns:=/vtr -p robots:=$ROBOTS
      - ros2 run vtr_gui multi_robot_web_server --ros-args -r __ns:=/vtr -p robots:=$ROBOTS
      - ros2 run vtr_gui setup_server --ros-args -r __ns:=/vtr --num-robots 4
      # - firefox --new-window "localhost:5200" # the webpage has to wait for everything above

  - window_name: convoy_manager
    layout: main-horizontal
    shell_command_before:
      - source ${VTRSRC}/main/install/setup.bash
    panes:
      - >
        ros2 launch vtr_multi_robot convoy_route_planner.launch.py
        robots:=$ROBOTS base_params:=ouster_hunter_default.yaml convoy_params:=convoy_params.yaml