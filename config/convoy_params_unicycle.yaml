/**:
  ros__parameters:
    tactic:
      chain:
        alpha: 0.0
    path_planning:
      unicycle_mpc:
        type: unicycle_mpc
        control_period: 100 # ms
     
        speed_scheduler:
          planar_curv_weight: 0.0
          profile_curv_weight: 0.0 
          eop_weight: 1.0
          min_vel: 0.5
        mpc:
          # Controller Params
          extrapolate_robot_pose: false
          mpc_verbosity: false
          forward_vel: 1.0
          max_lin_vel: 1.5
          max_ang_vel: 0.5
          max_ang_acc: 5.0
          ang_alpha: 0.811
          lin_alpha: 0.0
          robot_linear_velocity_scale: 1.0 # Used to scale the output twist linear velocity messages by some constant factor to compensate internal low level control miscalibration
          robot_angular_velocity_scale: 1.0 # Used to scale the output twist angular velocity messages by some constant factor to compensate internal low level control miscalibration
     
          vehicle_model: "unicycle"
     
          q_x: 10.0
          q_y: 10.0
          q_th: 5.0
          r1: 1.0
          r2: 1.0
          racc1: 0.1
          racc2: 0.5
     
          # Misc
          command_history_length: 100

      unicycle_mpc_follower:
        type: unicycle_mpc_follower
        control_period: 100
        distance_margin: 0.5
        q_dist: 1.0
        waypoint_selection: arclength
        speed_scheduler:
          planar_curv_weight: 0.0
          profile_curv_weight: 1.0 
          eop_weight: 1.0
          min_vel: 0.5
        mpc:
          # Controller Params
          extrapolate_robot_pose: true
          mpc_verbosity: false
          forward_vel: 1.0
          max_lin_vel: 1.5 # Note: This is set to 2.0 in the driver code currently
          max_ang_vel: 0.5
          max_ang_acc: 5.0
          ang_alpha: 0.811
          lin_alpha: 0.0
          robot_linear_velocity_scale: 1.0 # Used to scale the output twist linear velocity messages by some constant factor to compensate internal low level control miscalibration
          robot_angular_velocity_scale: 1.0 # Used to scale the output twist angular velocity messages by some constant factor to compensate internal low level control miscalibration
          max_lin_acc: 0.5
          vehicle_model: "unicycle"
          recovery_steps: 15
          failure_threshold: 5

          # Tunable controller parameters(Currently only works for the Bicycle)
          q_x: 10.0
          q_y: 10.0
          q_th: 5.0
          r1: 1.0
          r2: 1.0
          racc1: 0.1
          racc2: 0.5

    log_enabled:
      #- tactic.module
      - mission.state_machine
      - mission.server
        # planner manager
      - cbit.control
      #- cbit.debug
      #- cbit.path_planning
        # mpc
      #- mpc.speed_scheduler
      - mpc.debug
      - mpc.solver
      - mpc.follower
      - mpc.follower.target
      - mpc.follower.pid
        # path planner
      #- cbit_planner.path_planning
        # pose graph
      #- pose_graph
        # lidar pipeline
      #- lidar.pipeline
      #- lidar.preprocessing
      #- lidar.odometry_icp
      #- lidar.odometry_map_maintenance
      #- lidar.vertex_test
      #- lidar.localization_map_recall
      #- lidar.localization_icp
      #- lidar.intra_exp_merging
      #- lidar.inter_exp_merging
      #- lidar.leader_locator


/prof_plum/vtr/navigator:
  ros__parameters:
   path_planning:
    unicycle_mpc_follower:
      leader_namespace:
        /mr_green 
      follow_distance: 2.0

/mr_green/vtr/navigator:
  ros__parameters:
   path_planning:
    unicycle_mpc_follower:
      leader_namespace:
        # /prof_plum 
        /mrs_peacock
      follow_distance: 2.0

/col_mustard/vtr/navigator:
  ros__parameters:
   path_planning:
    unicycle_mpc_follower:
      leader_namespace:
        /prof_plum
      follow_distance: 23.4

/mrs_peacock/vtr/navigator:
  ros__parameters:
   path_planning:
    unicycle_mpc_follower:
      leader_namespace:
        # /col_mustard
        /mr_green
      follow_distance: 2.0  

/vtr/convoy_planning_node:
  ros__parameters:
    mr_green:
      leader_mpc: unicycle_mpc
      follower_mpc: unicycle_mpc_follower
    prof_plum:
      leader_mpc: unicycle_mpc
      follower_mpc: unicycle_mpc_follower
    col_mustard:
      leader_mpc: unicycle_mpc
      follower_mpc: unicycle_mpc_follower
    mrs_peacock:
      leader_mpc: unicycle_mpc
      follower_mpc: unicycle_mpc_follower

    
