/**:
  ros__parameters:
    tactic:
      chain:
        alpha: 0.0
    path_planning:
      bicycle_mpc:
        type: bicycle_mpc
        control_period: 100
        speed_scheduler:
          planar_curv_weight: 0.0
          profile_curv_weight: 1.0 
          eop_weight: 1.0
          min_vel: 0.5
        mpc:
          # Controller Params
          extrapolate_robot_pose: true
          mpc_verbosity: false
          forward_vel: 0.75
          max_lin_vel: 1.5 # Note: This is set to 2.0 in the driver code currently
          max_ang_vel: 0.46
          max_ang_acc: 0.89
          ang_alpha: 0.0
          lin_alpha: 0.0
          max_lin_acc: 0.5
          vehicle_model: "bicycle"
          wheelbase: 0.65
          recovery_steps: 15
          failure_threshold: 5

          # Tunable controller parameters(Currently only works for the Bicycle)
          forward:
            q_lat: 10.0
            q_lon: 4.0
            q_th: 7.0
            r1: 0.0
            r2: 3.0
            racc1: 4.0
            racc2: 10.0
          reverse:
            q_lat: 10.0
            q_lon: 3.0
            q_th: 7.0
            r1: 0.1
            r2: 1.0
            racc1: 2.0
            racc2: 3.5
      bicycle_mpc_follower:
        type: bicycle_mpc_follower
        control_period: 100
        distance_margin: 10.0
        waypoint_selection: euclidean
        speed_scheduler:
          planar_curv_weight: 0.0
          profile_curv_weight: 1.0 
          eop_weight: 1.0
          min_vel: 0.5
        mpc:
          # Controller Params
          extrapolate_robot_pose: true
          mpc_verbosity: false
          forward_vel: 0.75
          max_lin_vel: 1.5 # Note: This is set to 2.0 in the driver code currently
          max_ang_vel: 0.46
          max_ang_acc: 0.89
          ang_alpha: 0.0
          lin_alpha: 0.0
          max_lin_acc: 0.5
          vehicle_model: "bicycle"
          wheelbase: 0.65
          recovery_steps: 15
          failure_threshold: 5

          # Tunable controller parameters(Currently only works for the Bicycle)
          forward:
            q_lat: 10.0
            q_lon: 4.0
            q_th: 7.0
            r1: 0.0
            r2: 3.0
            racc1: 4.0
            racc2: 5.0
          reverse:
            q_lat: 10.0
            q_lon: 3.0
            q_th: 7.0
            r1: 0.1
            r2: 1.0
            racc1: 2.0
            racc2: 3.5
      unicycle_mpc:
